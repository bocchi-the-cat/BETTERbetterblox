name: Extension PR Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-meta:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests
      - run: python update_extensions.py
      - id: set-matrix
        run: echo "matrix=$(cat meta.json)" >> $GITHUB_OUTPUT

  process-sync:
    needs: fetch-meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, chrome]
    steps:
      - name: Checkout Merge Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.browser == 'firefox' && 'FF-merge' || 'CR-merge' }}
          fetch-depth: 0

      - name: Download and Unpack
        run: |
          URL="${{ fromJson(needs.fetch-meta.outputs.matrix)[matrix.browser].url }}"
          
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' -exec rm -rf {} +
          
          wget -O plugin.zip "$URL"
          unzip -o plugin.zip -d . || true
          rm -f plugin.zip

      - name: Push and Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          BROWSER: ${{ matrix.browser }}
          VER: ${{ fromJson(needs.fetch-meta.outputs.matrix)[matrix.browser].version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ "$BROWSER" = "firefox" ]; then
            HEAD="FF-merge"
            BASE="Firefox"
          else
            HEAD="CR-merge"
            BASE="Chrome"
          fi

          git add .
          if git diff --staged --quiet; then
            echo "No new changes for $BROWSER version $VER"
          else
            git commit -m "Sync $BROWSER to version $VER"
            git push origin "$HEAD" --force
            
            gh pr create \
              --title "🚀 Update $BASE to $VER" \
              --body "Automated sync from $BROWSER store. Version: $VER" \
              --base "$BASE" \
              --head "$HEAD" || echo "PR already exists, branch updated."
          fi
